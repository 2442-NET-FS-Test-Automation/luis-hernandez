<!DOCTYPE html>
<html lang="en">
<head> 
    <!-- These are HTML Comments -->
     <!-- head contains metadata about document
      things ike language, charset, etc. Doesn't render -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Body contains the stuff that DOES render. Typically (always) within HTML elements -->
    <header>
        <h1>City Library</h1> <!-- These are HTML elements. -->
        <nav>
            <a href="index.html">Catalog</a> <!-- Elements can have attributes, like href which lets your browser know that HTML age to load when you click the link -->
            <a href="login.html">Sign in</a>
        </nav>
    </header>
    
    <main>
        <section id="catalog"> <!-- Some elements are self closing -->
            <h2>Catalog</h2>

            <div class="toolbar">
                <!-- Our first input -  a placeholder for searching the catalog -->
                 <label for="serch">Search:</label>
                 <input type="search" id="search" name="search" placeholder="title or SKU">
                 <span class="hint">try a SKU like BK-101</span>
            </div>

            <div class="cards" id="catalog-cards">
                <article class="card">
                    <h3>Clean Code</h3>
                    <dl>
                        <dt>SKU</dt><dd>BK-101</dd>
                        <dt>Price</dt><dd>29.99</dd>
                        <dt>In stock</dt><dd>12</dd>
                    </dl>
                </article>
            </div>
        </section>


    </main>

    <footer class="site-footer"> 
        <p>City library - frontend demo</p>
    </footer>
</body>
</html>
